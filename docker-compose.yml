services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PHP-FPM  (Laravel application)
  # ─────────────────────────────────────────────────────────────────────────────
  php:
    build:
      context: .                              # repo root (Dockerfile uses relative paths)
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      # Full source bind-mount so PHP picks up code changes without rebuild
      - ./apps/backend:/var/www/html
      # Named volume shadows the host's empty vendor/ – pre-populated by entrypoint.sh
      - backend_vendor:/var/www/html/vendor
      # Compiled assets (written by npm.sh, read by Nginx via shared mount below)
      - backend_build:/var/www/html/public/build
      # Persist writable Laravel dirs; prevents permission fights with host UID
      - backend_storage:/var/www/html/storage
      - backend_bootstrap_cache:/var/www/html/bootstrap/cache
    env_file:
      - ./apps/backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - menusnap

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx  (reverse proxy → PHP-FPM on port 9000)
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Serve static files directly (avoids routing them through PHP-FPM)
      - ./apps/backend/public:/var/www/html/public:ro
      - backend_build:/var/www/html/public/build:ro
    depends_on:
      - php
    networks:
      - menusnap

  # ─────────────────────────────────────────────────────────────────────────────
  # MySQL 8.4
  # ─────────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: "${DB_DATABASE:-menusnap}"
      MYSQL_USER: "${DB_USERNAME:-menusnap}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"     # exposed for local DB clients; remove in production
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - menusnap

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  backend_vendor:
  backend_build:
  backend_storage:
  backend_bootstrap_cache:

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  menusnap:
    driver: bridge
